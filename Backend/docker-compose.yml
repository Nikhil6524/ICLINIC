# docker-compose up -d
# Spins up: Backend API + Redis + PostgreSQL

version: "3.9"

services:
  # ─── Redis ──────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: iclinic_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Nikhil06
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Backend API ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: Backend/dockerfile
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=iclinic_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Nikhil06
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_PASSWORD=
      - JWT_SECRET_KEY=super-secret-key
      - JWT_ALGORITHM=HS256
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
